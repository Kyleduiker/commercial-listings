const SAMPLE_NEEDS = [
  {category:'Industrial',description:'Looking for 3,000–6,000 sf industrial bay in SE or NE Calgary. Drive-in door required.',budget:'Up to $1.5M or $18/sf',location:'SE / NE Calgary',size:'3,000–6,000 sf',agent:'Sam Patel',date:'March 2026'},
  {category:'Land',description:'Client seeking 2–5 acres of industrial land near Stoney Trail. Must be serviced.',budget:'$1M–$3M',location:'Calgary / Rocky View',size:'2–5 Acres',agent:'Cheri Long',date:'March 2026'},
  {category:'Investment',description:'Investor looking for multi-tenant commercial building, NNN lease preferred. 6%+ cap rate.',budget:'$2M–$5M',location:'Calgary Area',size:'Any',agent:'Julie Stefan',date:'March 2026'},
];

let allListings=[], allAgents=[], allNeeds=[], currentAgent='all';

function csvToRows(t){const r=[];let row=[],c='',q=false;for(let i=0;i<t.length;i++){const ch=t[i];if(ch==='"'){if(q&&t[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){row.push(c);c='';}else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&t[i+1]==='\n')i++;row.push(c);r.push(row);row=[];c='';}else c+=ch;}if(c||row.length){row.push(c);r.push(row);}return r;}

async function loadData(){
  try{
    const r1=await fetch(LISTINGS_CSV);
    const rows=csvToRows(await r1.text()).slice(1).filter(r=>r[0]);
    allListings=rows.map(r=>({category:r[0]||'',address:r[1]||'',mls:r[2]||'',size:r[3]||'',type:r[4]||'Sale',price:r[5]||'',comments:r[6]||'',agent:r[7]||'',status:r[8]||'Active',photo:r[9]||'',brochure:r[10]||''}));
    const r2=await fetch(AGENTS_CSV);
    const ar=csvToRows(await r2.text()).slice(1).filter(r=>r[0]);
    allAgents=ar.map(r=>({name:r[0]||'',title:r[1]||'',phone:r[2]||'',email:r[3]||'',photo:r[4]||''}));
    if(NEEDS_CSV){const r3=await fetch(NEEDS_CSV);const nr=csvToRows(await r3.text()).slice(1).filter(r=>r[0]);allNeeds=nr.map(r=>({category:r[0]||'',description:r[1]||'',budget:r[2]||'',location:r[3]||'',size:r[4]||'',agent:r[5]||'',date:r[6]||''}));}
    else allNeeds=SAMPLE_NEEDS;
    document.getElementById('statusMsg').textContent='Loaded '+allListings.length+' listings ✓';
  }catch(e){
    allListings=SAMPLE_LISTINGS; allAgents=SAMPLE_AGENTS; allNeeds=SAMPLE_NEEDS;
    document.getElementById('statusMsg').textContent='Using sample data';
  }
  populateAgentSelect();
  renderPages();
}

function populateAgentSelect(){
  const sel=document.getElementById('agentSelect');
  const agents=[...new Set(allListings.map(l=>l.agent).filter(Boolean))].sort();
  sel.innerHTML='<option value="all">Full Report — All Listings</option>';
  agents.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a+' — Individual Report';sel.appendChild(o);});
  sel.onchange=()=>{currentAgent=sel.value;renderPages();};
}

function badgeHtml(status,type){
  const s=(status||'').toLowerCase(),t=(type||'').toLowerCase();
  if(s==='sold')return`<span class="badge b-sold">Sold</span>`;
  if(s==='conditionally sold')return`<span class="badge b-condsold">Cond. Sold</span>`;
  if(s==='leased')return`<span class="badge b-leased">Leased</span><br><span style="font-size:8.5px;color:#999">Remains for Sale</span>`;
  if(s==='conditionally leased')return`<span class="badge b-condleased">Cond. Leased</span>`;
  if(s==='new')return`<span class="badge b-new">New</span><span class="badge b-${t==='lease'?'lease':'sale'}">${t==='lease'?'Lease':'Sale'}</span>`;
  if(s==='price reduction')return`<span class="badge b-${t==='lease'?'lease':'sale'}">${t==='lease'?'Lease':'Sale'}</span><span class="badge b-pricered">Price Reduced</span>`;
  return t==='lease'?`<span class="badge b-lease">Lease</span>`:`<span class="badge b-sale">Sale</span>`;
}

function renderListingRow(l){
  const bullets=(l.comments||'').split('|').filter(Boolean).map(c=>`<div class="comment-bullet">${c.trim()}</div>`).join('');
  return`<tr>
    <td class="td-photo">
      ${l.photo?`<img class="listing-photo" src="${l.photo}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
      <div class="listing-photo-ph" style="${l.photo?'display:none':''}">🏢</div>
    </td>
    <td style="min-width:130px">
      <div class="prop-address">${(l.address||'').replace(/\n/g,'<br>')}</div>
      ${l.mls?`<div class="prop-mls">MLS# ${l.mls}</div>`:''}
      ${l.brochure?`<a class="prop-brochure" href="${l.brochure}">⬇ Brochure</a>`:''}
    </td>
    <td class="td-size">${l.size||'—'}</td>
    <td class="td-type">${badgeHtml(l.status,l.type)}</td>
    <td class="td-price"><div class="price-val">${(l.price||'').replace(/\n/g,'<br>')}</div></td>
    <td>${bullets}</td>
    <td class="td-contact"><div class="contact-nm">${l.agent||'—'}</div></td>
  </tr>`;
}

function sectionTabsHtml(activeCat){
  return CAT_ORDER.map(c=>`<div class="section-tab${c===activeCat?' active-tab':''}">${c}</div>`).join('');
}

function renderCoverPage(agentName){
  const isAgent=agentName&&agentName!=='all';
  return`<div class="pdf-page cover-page">
    <div class="cover-left-bar"></div>
    <div class="cover-top-bar"></div>
    <div class="cover-logo-wrap">
      <div class="cover-logo-bars">
        <div class="cover-logo-bar"></div><div class="cover-logo-bar"></div>
        <div class="cover-logo-bar"></div><div class="cover-logo-bar"></div>
        <div class="cover-logo-bar"></div>
      </div>
      <div class="cover-rlp">Royal LePage®</div>
      <div class="cover-commercial">Commercial™</div>
      <div class="cover-solutions">Royal LePage® Solutions</div>
    </div>
    <div class="cover-title">Commercial Listings</div>
    <div class="cover-month">${REPORT_MONTH}</div>
    ${isAgent?`<div class="cover-agent-name">${agentName}</div>`:''}
    <div class="cover-url">www.royallepagesolutions.com/commercial</div>
  </div>`;
}

function renderTocPage(listings){
  const activeCats=CAT_ORDER.filter(c=>listings.some(l=>l.category===c));
  const items=activeCats.map(c=>{
    const count=listings.filter(l=>l.category===c).length;
    return`<div class="toc-item"><span class="toc-item-name">${CAT_LABELS[c]}</span><span class="toc-item-num">${count}</span></div>`;
  }).join('');
  return`<div class="pdf-page" style="padding:48px 40px;">
    <div style="font-family:'Montserrat',sans-serif;font-weight:900;font-size:28px;letter-spacing:4px;text-transform:uppercase;color:#111;margin-bottom:32px;">Table of Contents</div>
    ${items}
  </div>`;
}

function renderSectionPage(cat, listings){
  const rows=listings.map(renderListingRow).join('');
  return`<div class="pdf-page section-page">
    <div class="section-header">
      <div class="section-title-red">${CAT_LABELS[cat]||cat}</div>
      <div class="section-tabs">${sectionTabsHtml(cat)}</div>
    </div>
    <table class="listing-table">
      <thead><tr>
        <th style="width:72px"></th>
        <th>Property</th>
        <th style="width:100px">Size</th>
        <th style="width:72px">Type</th>
        <th style="width:108px">Asking Price</th>
        <th>Comments</th>
        <th style="width:80px">Contact</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderNeedsPage(needs){
  if(!needs.length)return'';
  const rows=needs.map(n=>`<tr>
    <td><span class="needs-cat-badge">${n.category}</span></td>
    <td>${n.description}</td>
    <td style="font-weight:700;color:#111;">${n.budget}</td>
    <td>${n.location}</td>
    <td>${n.size}</td>
    <td><div class="contact-nm">${n.agent}</div><div style="font-size:9px;color:#999;">${n.date}</div></td>
  </tr>`).join('');
  return`<div class="pdf-page section-page">
    <div class="section-header">
      <div class="section-title-red">Needs &amp; Wants</div>
      <div class="section-tabs" style="padding:11px 16px;font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.4);text-transform:uppercase;">Buyer Requirements — Contact Agent If You Have A Match</div>
    </div>
    <table class="needs-table">
      <thead><tr>
        <th style="width:90px">Category</th>
        <th>What They're Looking For</th>
        <th style="width:120px">Budget / Rate</th>
        <th style="width:120px">Location</th>
        <th style="width:90px">Size</th>
        <th style="width:80px">Agent</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderRosterPage(agents){
  const cards=agents.map(a=>`<div class="roster-card">
    ${a.photo?`<img class="roster-photo" src="${a.photo}" alt="${a.name}" onerror="this.style.display='none'">`:`<div class="roster-photo-ph">👤</div>`}
    <div class="roster-name">${a.name}</div>
    <div class="roster-title">${(a.title||'').replace(/\n/g,'<br>')}</div>
    <div class="roster-phone">${a.phone}</div>
    <div class="roster-email">${a.email}</div>
  </div>`).join('');
  return`<div class="pdf-page roster-page">
    <div class="roster-header">Our Associates</div>
    <div class="roster-grid">${cards}</div>
  </div>`;
}

function renderAgentFooterPage(agent){
  if(!agent)return'';
  return`<div class="pdf-page agent-footer-page">
    ${agent.photo?`<img class="agent-footer-photo" src="${agent.photo}" alt="${agent.name}" onerror="this.style.display='none'">`:`<div class="agent-footer-photo-ph">👤</div>`}
    <div class="agent-footer-eyebrow">For further information, please contact:</div>
    <div class="agent-footer-name">${agent.name}</div>
    <div class="agent-footer-title">${(agent.title||'Associate\nCommercial Division').replace(/\n/g,'<br>')}</div>
    <div class="agent-footer-phone">${agent.phone}</div>
    <div class="agent-footer-email">${agent.email}</div>
    <div class="agent-footer-brand">Royal LePage® Solutions — Commercial Division · www.royallepagesolutions.com</div>
  </div>`;
}

function renderPages(){
  const isAgent = currentAgent !== 'all';
  const listings = isAgent ? allListings.filter(l=>l.agent===currentAgent) : allListings;
  const activeCats = CAT_ORDER.filter(c=>listings.some(l=>l.category===c));
  const agentObj = isAgent ? (allAgents.find(a=>a.name===currentAgent)||{name:currentAgent,title:'Associate\nCommercial Division',phone:'',email:'',photo:''}) : null;

  let pages = '';
  pages += renderCoverPage(currentAgent);
  if(!isAgent) pages += renderTocPage(listings);
  activeCats.forEach(cat=>{
    pages += renderSectionPage(cat, listings.filter(l=>l.category===cat));
  });
  if(!isAgent && allNeeds.length) pages += renderNeedsPage(allNeeds);
  if(!isAgent && allAgents.length) pages += renderRosterPage(allAgents);
  if(isAgent && agentObj) pages += renderAgentFooterPage(agentObj);

  document.getElementById('reportPages').innerHTML = pages;

  // Update page title for PDF filename
  const titleSuffix = isAgent ? `_${currentAgent.replace(/\s+/g,'-')}` : '_Full-Report';
  document.title = `RLP_Commercial_${REPORT_MONTH.replace(/\s+/g,'_')}${titleSuffix}`;
}

loadData().then(()=>{
  // Check URL param for pre-selected agent
  const params=new URLSearchParams(window.location.search);
  const agentParam=params.get('agent');
  if(agentParam){
    currentAgent=agentParam;
    const sel=document.getElementById('agentSelect');
    if(sel)sel.value=agentParam;
    renderPages();
  }
});
</script>
</body>
</html>
